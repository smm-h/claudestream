[project]
name = "claudestream"
version = "0.2.0"
description = "A Python library and CLI for streaming Claude Code's JSON protocol"
requires-python = ">=3.11"
license = "MIT"
authors = [{name = "SMM-H", email = "lisa.codi@veliu.com"}]
dependencies = [
    "strictcli",
    "selfdoc",
    "claudewheel",
]
keywords = ["rlsbl"]

[project.scripts]
claudestream = "claudestream._cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
claudewheel = { path = "../claudewheel", editable = true }

[dependency-groups]
dev = ["pytest"]
